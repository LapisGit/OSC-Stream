name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./OSC-Stream/OSC-Stream.csproj

    - name: Build
      run: dotnet build ./OSC-Stream/OSC-Stream.csproj --no-restore -c Release

    - name: Test
      run: dotnet test ./OSC-Stream/OSC-Stream.csproj --no-build --verbosity normal -c Release

    - name: Publish
      run: dotnet publish ./OSC-Stream/OSC-Stream.csproj -c Release -o publish

    - name: Zip publish output
      run: |
        cd publish
        zip -r ../app.zip .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dotnet-app
        path: app.zip
